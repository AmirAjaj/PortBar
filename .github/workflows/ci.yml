name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Lint (swift-format)
        run: swift format lint --recursive --strict Sources Tests

      - name: Build
        run: swift build

      - name: Test
        run: ./Scripts/test.sh

      - name: Assemble .app bundle
        run: ./Scripts/build-app.sh release
