name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build PortBar.app
        run: ./Scripts/build-app.sh release

      - name: Zip the app (ditto preserves the bundle + signature)
        run: ditto -c -k --keepParent dist/PortBar.app dist/PortBar.zip

      - name: Compute checksum (for the Homebrew cask)
        run: |
          shasum -a 256 dist/PortBar.zip | tee dist/PortBar.zip.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/PortBar.zip
            dist/PortBar.zip.sha256
