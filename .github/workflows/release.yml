name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build PortBar.app
        run: ./Scripts/build-app.sh release

      - name: Zip the app (ditto preserves the bundle + signature)
        run: ditto -c -k --keepParent dist/PortBar.app dist/PortBar.zip

      - name: Compute checksum (for the Homebrew cask)
        run: |
          shasum -a 256 dist/PortBar.zip | tee dist/PortBar.zip.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/PortBar.zip
            dist/PortBar.zip.sha256

      - name: Bump Homebrew cask on main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(shasum -a 256 dist/PortBar.zip | cut -d' ' -f1)"
          git fetch origin main
          git checkout -B main origin/main
          sed -i '' -E "s/^  version \".*\"/  version \"${VERSION}\"/" Casks/portbar.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/portbar.rb
          if git diff --quiet Casks/portbar.rb; then
            echo "Cask already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Casks/portbar.rb
            git commit -m "ci: bump portbar cask to ${VERSION}"
            git push origin main
          fi
